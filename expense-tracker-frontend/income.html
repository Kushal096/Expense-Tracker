<!DOCTYPE html>
<html>
<head>
  <title>Income - Expense App</title>
  <link rel="stylesheet" href="styles/income.css">
  <link rel="stylesheet" href="styles/loading.css">
  <script src="scripts/api.js" defer></script>
  <script src="scripts/income.js" defer></script>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <h1>INCOME</h1>
    </div>
    <div class="nav" style="flex: 1;">
      <a href="dashboard.html">Dashboard</a>
      <a href="expenses.html">Expenses</a>
      <a href="income.html" class="active">Income</a>
      <a href="login.html" id="logoutLink" style="margin-top: auto;">Logout</a>
    </div>
  </div>

  <div class="main">
    <div class="header-container">
      <div class="header-title">
        <h1>INCOME</h1>
        <div class="hr-line"></div>
      </div>
      <button class="top-btn" id="addIncomeBtn">Add Income &rarr;</button>
    </div>
    
    <div class="overview-card">
      <small id="totalIncomeCount">Total Income (0)</small>
      <h2 id="totalIncomeAmount">$0.00</h2>
    </div>

    <div class="table-controls">
      <div class="search-bar">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13.8427 13.8427C16.9248 10.7606 16.9248 5.76307 13.8427 2.68095C10.7606 -0.401168 5.76307 -0.401168 2.68095 2.68095C-0.401168 5.76307 -0.401168 10.7606 2.68095 13.8427C5.76307 16.9248 10.7606 16.9248 13.8427 13.8427ZM13.8427 13.8427L18.4239 18.4239" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <input type="text" id="searchIncomeInput" placeholder="Search income by title, category, or amount...">
      </div>
      
      <div class="filters-row">
        <div class="filter-group">
          <label>Category</label>
          <select class="filter-input" id="filterCategory">
            <option value="">All Categories</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>Amount Range</label>
          <div class="range-inputs">
            <input type="number" class="filter-input italic" id="minIncomeAmount" placeholder="Min">
            <input type="number" class="filter-input italic" id="maxIncomeAmount" placeholder="Max">
          </div>
        </div>
        
        <div class="filter-group">
          <label>Date Range</label>
          <div class="range-inputs">
            <input type="date" class="filter-input" id="startIncomeDate">
            <input type="date" class="filter-input" id="endIncomeDate">
          </div>
        </div>
      </div>
    </div>
    
    <div class="data-table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="incomeTableBody">
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="incomeModal">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modalTitle">New Income</h2>
        <button class="close-btn" id="closeModalBtn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 6L6 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 6L18 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Title</label>
          <input type="text" class="modal-input" id="title" placeholder="e.g. Monthly Salary">
        </div>
        <div class="form-group">
          <label>Amount</label>
          <input type="number" class="modal-input" id="amount" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select class="modal-input" id="category"></select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" class="modal-input" id="date">
        </div>
        <div class="modal-actions">
          <button class="btn-save" id="saveIncomeBtn">Save</button>
          <button class="btn-cancel" id="cancelIncomeBtn">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editIncomeModal">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="editModalTitle">Edit Income</h2>
        <button class="close-btn" id="closeEditModalBtn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 6L6 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 6L18 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Title</label>
          <input type="text" class="modal-input" id="editIncomeTitle" placeholder="e.g. Monthly Salary">
        </div>
        <div class="form-group">
          <label>Amount</label>
          <input type="number" class="modal-input" id="editIncomeAmount" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select class="modal-input" id="editIncomeCategory"></select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" class="modal-input" id="editIncomeDate">
        </div>
        <div class="modal-actions">
          <button class="btn-save" id="updateIncomeBtn">Update</button>
          <button class="btn-cancel" id="cancelEditIncomeBtn">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="confirmDeleteModal">
    <div class="modal-container delete-modal-container">
      <div class="modal-header">
        <h2>Delete Income</h2>
        <button class="close-btn" id="closeDeleteModalBtn" aria-label="Close delete confirmation">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 6L6 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 6L18 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body delete-modal-body">
        <p id="deleteMessageText" class="delete-modal-text">Delete this income? This action cannot be undone.</p>
        <div class="modal-actions">
          <button class="btn-save btn-danger" id="confirmDeleteBtn">Delete</button>
          <button class="btn-cancel" id="cancelDeleteBtn">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <script src="scripts/loading.js" defer></script>
</body>
</html>
