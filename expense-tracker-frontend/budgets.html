<!DOCTYPE html>
<html>

<head>
  <title>Budgets - Expense App</title>
  <link rel="stylesheet" href="styles/expenses.css">
  <link rel="stylesheet" href="styles/budgets.css">
  <link rel="stylesheet" href="styles/loading.css">
</head>

<body>
  <div class="sidebar">
    <div class="logo">
      <h1>BUDGETS</h1>
    </div>
    <div class="nav" style="flex: 1;">
      <a href="dashboard.html">Dashboard</a>
      <a href="expenses.html">Expenses</a>
      <a href="income.html">Income</a>
      <a href="budgets.html" class="active">Budgets</a>
      <a href="login.html" id="logoutLink" style="margin-top: auto;">Logout</a>
    </div>
  </div>

  <div class="main">
    <div class="header-container">
      <div class="header-title">
        <h1>BUDGETS</h1>
        <div class="hr-line"></div>
      </div>
      <button class="top-btn" id="addBudgetBtn">Add Budget &rarr;</button>
    </div>

    <div class="overview-card">
      <small id="totalBudgetCount">Total Budgets (0)</small>
      <h2 id="totalBudgetAmount">$0.00</h2>
    </div>

    <div class="table-controls">
      <div class="search-bar">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"
          xmlns="http://www.w3.org/2000/svg">
          <path
            d="M13.8427 13.8427C16.9248 10.7606 16.9248 5.76307 13.8427 2.68095C10.7606 -0.401168 5.76307 -0.401168 2.68095 2.68095C-0.401168 5.76307 -0.401168 10.7606 2.68095 13.8427C5.76307 16.9248 10.7606 16.9248 13.8427 13.8427ZM13.8427 13.8427L18.4239 18.4239"
            stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <input type="text" id="searchBudgetInput" placeholder="Search budgets by category...">
      </div>

      <div class="filters-row">
        <div class="filter-group">
          <label>Status</label>
          <select class="filter-input" id="filterStatus">
            <option value="">All Statuses</option>
            <option value="ON_TRACK">On Track</option>
            <option value="NEAR_LIMIT">Near Limit</option>
            <option value="EXCEEDED">Exceeded</option>
          </select>
        </div>
      </div>
    </div>

    <div class="data-table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>Category Name</th>
            <th>Budget Limit</th>
            <th>Amount Spent</th>
            <th>Usage %</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="budgetTableBody">
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="budgetModal">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modalTitle">New Budget</h2>
        <button class="close-btn" id="closeModalBtn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 6L6 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M6 6L18 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Category</label>
          <select class="modal-input" id="budgetCategory"></select>
        </div>
        <div class="form-group">
          <label>Budget Limit (Monthly)</label>
          <input type="number" class="modal-input" id="budgetLimit" placeholder="0.00">
        </div>
        <div class="modal-actions">
          <button class="btn-save" id="saveBudgetBtn">Save</button>
          <button class="btn-cancel" id="cancelBudgetBtn">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editBudgetModal">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="editModalTitle">Edit Budget</h2>
        <button class="close-btn" id="closeEditModalBtn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 6L6 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M6 6L18 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Category</label>
          <input type="text" class="modal-input" id="editBudgetCategory" disabled>
        </div>
        <div class="form-group">
          <label>Budget Limit (Monthly)</label>
          <input type="number" class="modal-input" id="editBudgetLimit" placeholder="0.00">
        </div>
        <div class="modal-actions">
          <button class="btn-save" id="updateBudgetBtn">Update</button>
          <button class="btn-cancel" id="cancelEditBudgetBtn">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="confirmDeleteModal">
    <div class="modal-container delete-modal-container">
      <div class="modal-header">
        <h2>Delete Budget</h2>
        <button class="close-btn" id="closeDeleteModalBtn" aria-label="Close delete confirmation">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 6L6 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M6 6L18 18" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </div>
      <div class="modal-body delete-modal-body">
        <p class="delete-modal-text">Are you sure you want to delete the budget for <span id="deleteBudgetCategoryName" style="font-weight: bold;"></span>? This action cannot be undone.</p>
        <div class="modal-actions">
          <button class="btn-save btn-danger" id="confirmDeleteBtn">Delete</button>
          <button class="btn-cancel" id="cancelDeleteBtn">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="scripts/api.js" defer></script>
  <script src="scripts/loading.js" defer></script>
  <script src="scripts/budgets.js" defer></script>
</body>

</html>
